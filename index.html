<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3Doku</title>
  <style>
    :root {
      --bg: #05060a;
      --panel: rgba(10, 13, 24, 0.72);
      --line: rgba(120, 255, 240, 0.18);
      --line-strong: rgba(120, 255, 240, 0.56);
      --txt: #eefaff;
      --muted: #8ca4b8;
      --cyan: #61fff2;
      --pink: #ff4fd8;
      --lime: #b9ff4d;
      --violet: #9c7bff;
      --ok: #73ffb1;
      --bad: #ff7aaa;
      --glow: 0 0 14px rgba(97,255,242,.24), 0 0 28px rgba(156,123,255,.12);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(156,123,255,.12), transparent 28%),
        radial-gradient(circle at 80% 22%, rgba(97,255,242,.09), transparent 24%),
        radial-gradient(circle at 50% 85%, rgba(255,79,216,.07), transparent 28%),
        var(--bg);
      color: var(--txt);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      touch-action: none;
    }
    #app { position: relative; width: 100%; height: 100%; }
    canvas { display:block; }
    .hud { position:absolute; inset:0; pointer-events:none; }
    .panel {
      background: rgba(8,10,18,.46);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: var(--glow);
    }
    .title {
      position:absolute; left:16px; top:14px; padding:12px 14px; pointer-events:auto;
      display:flex; flex-direction:column; gap:8px; min-width: 250px;
    }
    .title .main { font-size:14px; letter-spacing:.18em; text-transform:uppercase; }
    .title .sub { font-size:11px; color: var(--muted); }
    .difficulty-row, .nav-row { display:flex; gap:8px; flex-wrap:wrap; }
    .chip, .small-btn {
      pointer-events:auto; cursor:pointer; border-radius:999px; border:1px solid var(--line);
      background: rgba(8,12,20,.9); color: var(--muted); font-size:11px; font-weight:700;
      letter-spacing:.08em; text-transform:uppercase; padding:9px 12px;
    }
    .chip.active, .small-btn:hover {
      color: var(--txt); border-color: var(--line-strong);
      box-shadow: 0 0 12px rgba(97,255,242,.18);
    }
    .meta { font-size:12px; color: var(--muted); line-height: 1.35; }
    .meta strong { color: var(--txt); }
    .picker {
      position:absolute; right:16px; top:50%; transform:translateY(-50%); pointer-events:auto;
      display:flex; flex-direction:column; gap:12px; padding:14px; border-radius:24px;
      background: var(--panel); border:1px solid var(--line); box-shadow: var(--glow); backdrop-filter: blur(12px);
    }
    .num-btn {
      width:56px; height:56px; border-radius:50%; border:1px solid var(--line-strong);
      background: rgba(7,12,24,.85); color: var(--txt); font-size:22px; font-weight:700;
      cursor:pointer; transition: transform .12s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease;
    }
    .num-btn:hover, .num-btn.active {
      transform: scale(1.06);
      border-color: rgba(97,255,242,.95);
      box-shadow: 0 0 14px rgba(97,255,242,.28), 0 0 28px rgba(156,123,255,.18);
      background: rgba(18,26,44,.95);
    }
    .actions { display:flex; flex-direction:column; gap:10px; margin-top:6px; padding-top:8px; border-top:1px solid rgba(120,255,240,.12); }
    .hint {
      position:absolute; left:16px; bottom:16px; max-width:min(70vw, 460px); padding:12px 14px;
      border-radius:18px; color: var(--muted); font-size:12px; line-height:1.45; pointer-events:none;
    }
    .status-ok { color: var(--ok); }
    .status-bad { color: var(--bad); }
    @media (max-width: 820px) {

  /* PANEL DE NIVELES (arriba izquierda más compacto) */
  .title {
    left: 10px;
    top: 10px;
    width: calc(100vw - 20px);
    max-width: calc(100vw - 20px);
    padding: 10px 12px;
    border-radius: 18px;
  }

  .title .main {
    font-size: 14px;
    letter-spacing: .22em;
  }

  .title .sub {
    font-size: 10px;
  }

  .chip, .small-btn {
    font-size: 11px;
    padding: 8px 10px;
  }

  .meta {
    font-size: 12px;
  }


  /* 🔥 BARRA DE NÚMEROS ABAJO */
  .picker {
    position: fixed;
    bottom: 70px;
    left: 10px;
    right: 10px;
    top: auto;
    transform: none;

    display: flex;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    gap: 10px;

    padding: 12px;
    border-radius: 20px;

    background: rgba(10, 12, 25, 0.7);
    backdrop-filter: blur(10px);

    z-index: 30;
  }


  /* BOTONES 1–4 */
  .num-btn {
    width: 56px;
    height: 56px;
    font-size: 18px;
    flex-shrink: 0;
  }


  /* BOTONES BORRAR / RESET */
  .actions {
    display: flex;
    flex-direction: row;
    gap: 8px;
    margin: 0;
    padding: 0;
  }

  .actions .small-btn {
    flex: 1;
    font-size: 10px;
    padding: 10px;
  }


  /* TEXTO INFERIOR */
  .hint {
    bottom: 10px;
    left: 10px;
    right: 10px;
    padding: 10px 12px;
    font-size: 11px;
  }
}

    @media (max-width: 430px) {
      .title {
        width: calc(100vw - 104px);
        max-width: calc(100vw - 104px);
        padding: 9px 10px;
      }
      .title .main { font-size: 11px; letter-spacing: .20em; }
      .title .sub { font-size: 8px; }
      .chip, .small-btn {
        padding: 7px 9px;
        font-size: 9px;
      }
      .meta { font-size: 10px; }
      .picker {
        width: 88px;
        padding: 7px;
      }
      .num-btn {
        width: 40px;
        height: 40px;
        font-size: 17px;
      }
      .actions .small-btn {
        font-size: 8px;
        padding: 7px 6px;
      }
      .hint {
        font-size: 10px;
      }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div class="hud">
      <div class="title panel">
        <div class="main">3Doku</div>
        <div class="sub">gira · zoom · toca una cara · asigna 1–4</div>
        <div class="difficulty-row" id="difficultyRow">
          <button class="chip active" data-difficulty="facil">fácil</button>
          <button class="chip" data-difficulty="medio">medio</button>
          <button class="chip" data-difficulty="dificil">difícil</button>
        </div>
        <div class="nav-row">
          <button class="small-btn" id="prevLevel">prev</button>
          <button class="small-btn" id="nextLevel">next</button>
          <button class="small-btn" id="reloadLevel">reset nivel</button>
        </div>
        <div class="meta" id="levelMeta"></div>
      </div>

      <div class="picker" id="picker">
        <button class="num-btn" data-value="1">1</button>
        <button class="num-btn" data-value="2">2</button>
        <button class="num-btn" data-value="3">3</button>
        <button class="num-btn" data-value="4">4</button>
        <div class="actions">
          <button class="small-btn" id="clearFace">borrar</button>
          <button class="small-btn" id="resetAll">reset todo</button>
        </div>
      </div>

      <div class="hint panel" id="hintBox">
        Los discos visibles son las pistas del nivel. Aristas y vértices salen de la misma solución interna.
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const levelMeta = document.getElementById('levelMeta');
    const hintBox = document.getElementById('hintBox');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x05060a, 12, 30);

    const isMobile = window.innerWidth <= 820;
    const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.65, isMobile ? 10.4 : 6.25);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = isMobile ? 8.4 : 3.7;
    controls.maxDistance = isMobile ? 12.6 : 7.6;
    controls.rotateSpeed = 0.9;
    controls.zoomSpeed = 0.9;
    controls.target.set(0, 0.25, 0);
    controls.enablePan = false;

    scene.add(new THREE.AmbientLight(0x99aaff, 1.2));
    const dir1 = new THREE.DirectionalLight(0x61fff2, 1.6); dir1.position.set(4, 5, 6); scene.add(dir1);
    const dir2 = new THREE.DirectionalLight(0xff4fd8, 0.95); dir2.position.set(-5, -2, 4); scene.add(dir2);

    const group = new THREE.Group();
    scene.add(group);

    const tetraRadius = 2.15;
    const tetraGeo = new THREE.TetrahedronGeometry(tetraRadius, 0);
    tetraGeo.computeVertexNormals();
    const posAttr = tetraGeo.getAttribute('position');

    const uniqueVerts = [];
    for (let i = 0; i < posAttr.count; i++) {
      const v = new THREE.Vector3().fromBufferAttribute(posAttr, i);
      if (!uniqueVerts.some(u => u.distanceTo(v) < 1e-5)) uniqueVerts.push(v);
    }

    const neon = {
      cyan: new THREE.Color(0x61fff2),
      pink: new THREE.Color(0xff4fd8),
      lime: new THREE.Color(0xb9ff4d),
      violet: new THREE.Color(0x9c7bff)
    };

    const faceValues = [null, null, null, null];
    let selectedFace = null;
    let selectedNumber = 1;
    let currentDifficulty = 'facil';
    let currentLevelIndex = 0;
    let currentLevel = null;

    const faceMeshes = [];
    const faceCenters = [];
    const faceNormals = [];
    const faceIndexToVertices = [];

    const triCount = posAttr.count / 3;
    for (let t = 0; t < triCount; t++) {
      const a = new THREE.Vector3().fromBufferAttribute(posAttr, t * 3 + 0);
      const b = new THREE.Vector3().fromBufferAttribute(posAttr, t * 3 + 1);
      const c = new THREE.Vector3().fromBufferAttribute(posAttr, t * 3 + 2);
      const localGeo = new THREE.BufferGeometry().setFromPoints([a, b, c]);
      localGeo.setIndex([0, 1, 2]);
      localGeo.computeVertexNormals();

      const mat = new THREE.MeshPhysicalMaterial({
        color: 0x9c7bff,
        emissive: 0x112244,
        emissiveIntensity: 0.7,
        transparent: true,
        opacity: 0.24,
        roughness: 0.18,
        metalness: 0.08,
        transmission: 0.18,
        thickness: 0.3,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const mesh = new THREE.Mesh(localGeo, mat);
      mesh.userData.faceIndex = t;
      group.add(mesh);
      faceMeshes.push(mesh);

      const center = a.clone().add(b).add(c).multiplyScalar(1 / 3);
      faceCenters.push(center);

      const normal = new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a)).normalize();
      if (normal.dot(center) < 0) normal.multiplyScalar(-1);
      faceNormals.push(normal);

      const ids = [a, b, c].map(v => uniqueVerts.findIndex(u => u.distanceTo(v) < 1e-5));
      faceIndexToVertices.push(ids);
    }

    const vertexIdKey = (a, b) => [Math.min(a, b), Math.max(a, b)].join('-');

    const allEdges = [];
    for (let i = 0; i < uniqueVerts.length; i++) {
      for (let j = i + 1; j < uniqueVerts.length; j++) {
        const touchingFaces = [];
        faceIndexToVertices.forEach((verts, faceIndex) => {
          if (verts.includes(i) && verts.includes(j)) touchingFaces.push(faceIndex);
        });
        const a = uniqueVerts[i];
        const b = uniqueVerts[j];
        const mid = a.clone().add(b).multiplyScalar(0.5);
        allEdges.push({
          id: `e${allEdges.length}`,
          vertexPair: [i, j],
          key: vertexIdKey(i, j),
          faces: touchingFaces,
          midpoint: mid
        });
      }
    }

    const allVertices = uniqueVerts.map((vert, vertexIndex) => ({
      id: `v${vertexIndex}`,
      vertexIndex,
      faces: faceIndexToVertices.flatMap((verts, faceIndex) => verts.includes(vertexIndex) ? [faceIndex] : []),
      position: vert.clone()
    }));

    const edgeLines = [];
    const edgeSprites = [];
    const vertexSprites = [];
    const faceTextSprites = [];
    const outerByFace = 0.095;
    const outerByEdge = 0.11;

    function makeDiscSprite(text, color = '#e9f8ff', fontSize = 92, bg = 'rgba(6,12,24,0.62)', border = 'rgba(97,255,242,0.9)', r = 120) {
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(0.5, 0.5, 1);
      sprite.userData = { canvas, ctx, tex, color, fontSize, bg, border, r };
      updateDiscSprite(sprite, text);
      return sprite;
    }

    function updateDiscSprite(sprite, text) {
      const { canvas, ctx, tex, color, fontSize, bg, border, r } = sprite.userData;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (text == null || text === '') { tex.needsUpdate = true; return; }
      ctx.beginPath();
      ctx.arc(128, 128, r, 0, Math.PI * 2);
      ctx.fillStyle = bg; ctx.fill();
      ctx.lineWidth = 4; ctx.strokeStyle = border; ctx.shadowBlur = 18; ctx.shadowColor = border; ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.font = `700 ${fontSize}px Inter, Arial, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = color; ctx.shadowBlur = 18; ctx.shadowColor = color;
      ctx.fillText(String(text), 128, 132);
      ctx.shadowBlur = 0;
      tex.needsUpdate = true;
    }

    function makeFaceNumberSprite() {
      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 256;
      const ctx = canvas.getContext('2d');
      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(0.74, 0.74, 1);
      sprite.userData = { canvas, ctx, tex };
      updateFaceSprite(sprite, '');
      return sprite;
    }

    function updateFaceSprite(sprite, text, solved = false) {
      const { canvas, ctx, tex } = sprite.userData;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (text !== '' && text != null) {
        ctx.font = '700 126px Inter, Arial, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = solved ? '#73ffb1' : '#ffffff';
        ctx.shadowBlur = 20; ctx.shadowColor = solved ? '#73ffb1' : '#61fff2';
        ctx.fillText(String(text), 128, 132);
        ctx.shadowBlur = 0;
      }
      tex.needsUpdate = true;
    }

    const edgeLineMat = new THREE.LineBasicMaterial({ color: 0x61fff2, transparent: true, opacity: 0.52 });

    allEdges.forEach((edge) => {
      const [i, j] = edge.vertexPair;
      const a = uniqueVerts[i];
      const b = uniqueVerts[j];
      const g = new THREE.BufferGeometry().setFromPoints([a, b]);
      const line = new THREE.Line(g, edgeLineMat);
      group.add(line);
      edgeLines.push(line);

      const labelPos = edge.midpoint.clone().add(edge.midpoint.clone().normalize().multiplyScalar(outerByEdge));
      const sprite = makeDiscSprite('', '#e9f8ff', 88, 'rgba(8,14,24,0.66)', 'rgba(255,79,216,0.85)', 104);
      sprite.position.copy(labelPos);
      sprite.visible = false;
      group.add(sprite);
      edgeSprites.push(sprite);
      edge.sprite = sprite;
      edge.line = line;
    });

    allVertices.forEach((vertex) => {
      const labelPos = vertex.position.clone().add(vertex.position.clone().normalize().multiplyScalar(outerByFace + 0.12));
      const sprite = makeDiscSprite('', '#e9f8ff', 86, 'rgba(8,14,24,0.66)', 'rgba(185,255,77,0.9)', 104);
      sprite.position.copy(labelPos);
      sprite.visible = false;
      group.add(sprite);
      vertexSprites.push(sprite);
      vertex.sprite = sprite;
    });

    faceCenters.forEach((center, i) => {
      const sprite = makeFaceNumberSprite();
      sprite.position.copy(center.clone().add(faceNormals[i].clone().multiplyScalar(0.10)));
      group.add(sprite);
      faceTextSprites.push(sprite);
    });

    const levelDefinitions = {
      facil: [
        { solution: [1,2,3,4], clues: ['e0','e1','e3','v0','v2'], name: 'Fácil 1' },
        { solution: [2,1,4,3], clues: ['e0','e2','e5','v1','v3'], name: 'Fácil 2' },
        { solution: [3,1,2,4], clues: ['e1','e2','e4','v0','v1'], name: 'Fácil 3' },
        { solution: [4,2,1,3], clues: ['e0','e4','e5','v2','v3'], name: 'Fácil 4' },
        { solution: [2,4,1,3], clues: ['e1','e3','e5','v0','v2'], name: 'Fácil 5' }
      ],
      medio: [
        { solution: [1,2,3,4], clues: ['e0','e2','v1','v2'], name: 'Medio 1' },
        { solution: [2,4,1,3], clues: ['e1','e4','v0','v3'], name: 'Medio 2' },
        { solution: [3,1,4,2], clues: ['e0','e5','v1','v3'], name: 'Medio 3' },
        { solution: [4,3,1,2], clues: ['e2','e3','v0','v2'], name: 'Medio 4' },
        { solution: [2,3,4,1], clues: ['e1','e5','v0','v1'], name: 'Medio 5' }
      ],
      dificil: [
        { solution: [1,2,3,4], clues: ['e0','e3','v0'], name: 'Difícil 1' },
        { solution: [2,1,4,3], clues: ['e1','e5','v1'], name: 'Difícil 2' },
        { solution: [3,1,2,4], clues: ['e2','e4','v2'], name: 'Difícil 3' },
        { solution: [4,2,1,3], clues: ['e0','e5','v1'], name: 'Difícil 4' },
        { solution: [2,4,1,3], clues: ['e3','e4','v0'], name: 'Difícil 5' },
        { solution: [3,2,4,1], clues: ['e1','e2','v3'], name: 'Difícil 6' }
      ]
    };

    function computeClueValues(solution) {
      const clues = {};
      allEdges.forEach((edge) => {
        const [f0, f1] = edge.faces;
        clues[edge.id] = solution[f0] + solution[f1];
      });
      allVertices.forEach((vertex) => {
        clues[vertex.id] = vertex.faces.reduce((sum, faceIndex) => sum + solution[faceIndex], 0);
      });
      return clues;
    }

    function setSelectedFace(idx) {
      selectedFace = idx;
      faceMeshes.forEach((mesh, i) => {
        const selected = i === idx;
        mesh.material.color.set(selected ? 0x61fff2 : 0x9c7bff);
        mesh.material.emissive.set(selected ? 0x144b66 : 0x112244);
        mesh.material.opacity = selected ? 0.42 : 0.24;
        mesh.material.emissiveIntensity = selected ? 1.6 : 0.7;
      });
    }

    function setSelectedNumber(n) {
      selectedNumber = n;
      document.querySelectorAll('.num-btn').forEach(btn => btn.classList.toggle('active', Number(btn.dataset.value) === n));
    }
    setSelectedNumber(1);

    function assignNumberToSelectedFace() {
      if (selectedFace == null) return;
      faceValues[selectedFace] = selectedNumber;
      updateFaceSprite(faceTextSprites[selectedFace], selectedNumber, false);
      refreshStatus();
    }

    function clearSelectedFace() {
      if (selectedFace == null) return;
      faceValues[selectedFace] = null;
      updateFaceSprite(faceTextSprites[selectedFace], '');
      refreshStatus();
    }

    function resetAll() {
      for (let i = 0; i < 4; i++) {
        faceValues[i] = null;
        updateFaceSprite(faceTextSprites[i], '');
      }
      setSelectedFace(null);
      refreshStatus();
    }

    function arraysEqual(a, b) { return a.length === b.length && a.every((v, i) => v === b[i]); }

    function refreshStatus() {
      const filled = faceValues.every(v => v != null);
      const noRepeats = new Set(faceValues.filter(v => v != null)).size === faceValues.filter(v => v != null).length;
      let status = 'completa las 4 caras';
      let cls = '';
      if (!noRepeats) {
        status = 'no se puede repetir un número';
        cls = 'status-bad';
      } else if (filled) {
        const solved = arraysEqual(faceValues, currentLevel.solution);
        if (solved) {
          status = 'resuelto';
          cls = 'status-ok';
          faceValues.forEach((value, i) => updateFaceSprite(faceTextSprites[i], value, true));
        } else {
          status = 'no cuadra con las pistas';
          cls = 'status-bad';
          faceValues.forEach((value, i) => updateFaceSprite(faceTextSprites[i], value, false));
        }
      }
      levelMeta.innerHTML = `<strong>${currentLevel.name}</strong> · ${currentDifficulty} · pistas: ${currentLevel.clues.length}<br><span class="${cls}">${status}</span>`;
    }

    function applyLevel() {
      currentLevel = levelDefinitions[currentDifficulty][currentLevelIndex];
      currentLevel.clueValues = computeClueValues(currentLevel.solution);
      resetAll();

      allEdges.forEach(edge => {
        const show = currentLevel.clues.includes(edge.id);
        edge.sprite.visible = show;
        updateDiscSprite(edge.sprite, show ? currentLevel.clueValues[edge.id] : '');
      });
      allVertices.forEach(vertex => {
        const show = currentLevel.clues.includes(vertex.id);
        vertex.sprite.visible = show;
        updateDiscSprite(vertex.sprite, show ? currentLevel.clueValues[vertex.id] : '');
      });

      hintBox.innerHTML = `Discos visibles = pistas del nivel. Puedes girar y hacer zoom. En móvil el zoom deja alejar más el tetraedro y limita el tamaño máximo.`;
      document.querySelectorAll('.chip').forEach(btn => btn.classList.toggle('active', btn.dataset.difficulty === currentDifficulty));
      refreshStatus();
    }

    document.querySelectorAll('.num-btn').forEach(btn => btn.addEventListener('click', () => {
      setSelectedNumber(Number(btn.dataset.value));
      assignNumberToSelectedFace();
    }));
    document.getElementById('clearFace').addEventListener('click', clearSelectedFace);
    document.getElementById('resetAll').addEventListener('click', resetAll);
    document.getElementById('reloadLevel').addEventListener('click', applyLevel);
    document.getElementById('prevLevel').addEventListener('click', () => {
      const levels = levelDefinitions[currentDifficulty];
      currentLevelIndex = (currentLevelIndex - 1 + levels.length) % levels.length;
      applyLevel();
    });
    document.getElementById('nextLevel').addEventListener('click', () => {
      const levels = levelDefinitions[currentDifficulty];
      currentLevelIndex = (currentLevelIndex + 1) % levels.length;
      applyLevel();
    });
    document.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', () => {
      currentDifficulty = btn.dataset.difficulty;
      currentLevelIndex = 0;
      applyLevel();
    }));

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function updatePointer(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      const clientX = event.clientX ?? (event.touches && event.touches[0]?.clientX) ?? 0;
      const clientY = event.clientY ?? (event.touches && event.touches[0]?.clientY) ?? 0;
      pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
    }

    let downX = 0, downY = 0, moved = false;
    renderer.domElement.addEventListener('pointerdown', (e) => { downX = e.clientX; downY = e.clientY; moved = false; });
    renderer.domElement.addEventListener('pointermove', (e) => { if (Math.hypot(e.clientX - downX, e.clientY - downY) > 8) moved = true; });
    renderer.domElement.addEventListener('pointerup', (e) => {
      if (moved) return;
      updatePointer(e);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(faceMeshes, false);
      if (hits.length) setSelectedFace(hits[0].object.userData.faceIndex);
    });

    window.addEventListener('keydown', (e) => {
      if (/^[1-4]$/.test(e.key)) { setSelectedNumber(Number(e.key)); assignNumberToSelectedFace(); }
      if (e.key === 'Backspace' || e.key === 'Delete') clearSelectedFace();
      if (e.key.toLowerCase() === 'r') applyLevel();
      if (e.key.toLowerCase() === 'n') document.getElementById('nextLevel').click();
    });

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', resize);

    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      edgeLines.forEach((line, i) => { line.material.opacity = 0.38 + 0.14 * Math.sin(t * 1.2 + i); });
      edgeSprites.forEach((s, i) => { s.material.rotation = Math.sin(t * 0.3 + i) * 0.03; });
      vertexSprites.forEach((s, i) => { s.material.rotation = Math.cos(t * 0.34 + i) * 0.03; });
      controls.update();
      renderer.render(scene, camera);
    }

    applyLevel();
    animate();
  </script>
</body>
</html>
